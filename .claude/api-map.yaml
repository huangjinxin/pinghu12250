# ========== 图片优化 ==========
imgProxy:
  route: backend/src/routes/imgProxy.js
  base_path: /api/img-proxy
  endpoints:
    - { method: GET, path: /, desc: 图片缩略图代理(返回WebP) }
  params:
    - { name: url, type: string, required: true, desc: 图片路径(如 /uploads/avatars/xxx.jpg) }
    - { name: w, type: number, required: false, default: 400, desc: 缩略图宽度 }
    - { name: q, type: number, required: false, default: 80, desc: WebP质量(1-100) }
  response:
    - { Content-Type: image/webp }
    - { Cache-Control: public, max-age=31536000, immutable }
  security:
    - 仅允许 /uploads/ 和 /photos-static/ 前缀
  cache:
    - 路径: backend/public/img-cache/
    - 命名: {md5(url|w|q)}.webp
    - 有效期: 1年
