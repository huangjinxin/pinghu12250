# API 路由映射表
# 前端 API 对象 → 后端路由文件 → 主要端点
# 更新时间: 2025-12-26

# ========== 认证与用户 ==========
auth:
  api: authAPI
  route: backend/src/routes/auth.js
  base_path: /api/auth
  endpoints:
    - { method: POST, path: /register, desc: 用户注册 }
    - { method: POST, path: /login, desc: 用户登录 }
    - { method: POST, path: /refresh, desc: 刷新Token }

user:
  api: userAPI
  route: backend/src/routes/user.js
  controller: backend/src/controllers/userController.js
  base_path: /api/users
  endpoints:
    - { method: GET, path: /me, desc: 获取当前用户 }
    - { method: PUT, path: /me, desc: 更新个人信息 }
    - { method: PUT, path: /me/password, desc: 修改密码 }
    - { method: POST, path: /me/avatar, desc: 上传头像 }
    - { method: GET, path: /:id, desc: 获取用户详情 }
    - { method: GET, path: /:id/stats, desc: 用户统计 }

admin:
  api: adminAPI
  route: backend/src/routes/admin.js
  base_path: /api/admin
  endpoints:
    - { method: GET, path: /users, desc: 用户列表 }
    - { method: POST, path: /users, desc: 创建用户 }
    - { method: PUT, path: /users/:id/status, desc: 更新状态 }
    - { method: DELETE, path: /users/:id, desc: 删除用户 }
    - { method: GET, path: /stats, desc: 系统统计 }

